<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mobile Team</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="page-home">
    <main class="site-shell">
      <section class="hero-panel home-panel">
        <div class="hero-copy">
          <p class="kicker">Immersive mobile design studio</p>
          <h1 class="headline-xl">Mobile Team</h1>
          <p class="hero-text">
            We design cinematic product journeys for Android and iOS with a
            sharp eye for motion, detail, and storytelling.
          </p>
        </div>

        <div class="orbital-stage">
          <div class="ambient-ring ambient-ring-a"></div>
          <div class="ambient-ring ambient-ring-b"></div>

          <div class="split-control" data-split-control>
            <button
              class="arrow-button"
              type="button"
              aria-expanded="false"
              aria-label="Show Android and Apple options"
              data-split-trigger
            >
              <span class="arrow-icon" aria-hidden="true">
                <svg viewBox="0 0 64 64" class="icon-svg" focusable="false">
                  <circle cx="32" cy="32" r="25" fill="none" stroke="currentColor" stroke-width="5" />
                  <path
                    d="M28 22 40 32 28 42"
                    fill="none"
                    stroke="currentColor"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="4"
                  />
                </svg>
              </span>
            </button>

            <div class="platform-bubbles">
              <a
                class="platform-bubble android-bubble"
                href="./android.html"
                aria-label="Android"
                data-platform-choice
              >
                <svg viewBox="0 0 120 120" class="platform-icon" focusable="false">
                  <g
                    fill="none"
                    stroke="currentColor"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="6"
                  >
                    <path d="M37 45c5-12 17-20 23-20s18 8 23 20" />
                    <path
                      d="M33 50h54v25c0 12-9 21-21 21H54c-12 0-21-9-21-21V50Z"
                      fill="currentColor"
                      stroke="none"
                    />
                    <path d="M46 33 41 24" />
                    <path d="M74 33 79 24" />
                    <path d="M25 58v21" />
                    <path d="M95 58v21" />
                    <path d="M45 97v16" />
                    <path d="M75 97v16" />
                  </g>
                  <circle cx="50" cy="40" r="3.5" fill="#0a2313" />
                  <circle cx="70" cy="40" r="3.5" fill="#0a2313" />
                </svg>
              </a>

              <a
                class="platform-bubble apple-bubble"
                href="./ios.html"
                aria-label="iOS"
                data-platform-choice
              >
                <svg viewBox="0 0 120 120" class="platform-icon" focusable="false">
                  <path
                    d="M79.12 61.49c.08 17.13 15.03 22.84 15.2 22.92-.13.4-2.39 8.2-7.84 16.24-4.71 6.96-9.59 13.89-17.29 14.03-7.57.14-10-4.49-18.68-4.49-8.69 0-11.39 4.35-18.54 4.63-7.42.28-13.07-7.45-17.82-14.39-9.72-14.07-17.14-39.77-7.17-57.11 4.95-8.61 13.8-14.06 23.4-14.2 7.28-.14 14.15 4.9 18.68 4.9 4.54 0 13.06-6.06 22.01-5.17 3.75.16 14.3 1.52 21.06 11.41-.55.34-12.57 7.33-12.41 21.23ZM65.26 24.8c3.94-4.76 6.6-11.37 5.87-17.95-5.67.23-12.54 3.78-16.61 8.53-3.64 4.22-6.83 10.95-5.97 17.38 6.31.48 12.76-3.2 16.71-7.96Z"
                    fill="currentColor"
                  />
                </svg>
              </a>
            </div>
          </div>

          <p class="orbital-caption">Choose a platform experience</p>
        </div>
      </section>
    </main>

    <script>
      const control = document.querySelector("[data-split-control]");
      const trigger = document.querySelector("[data-split-trigger]");
      const platformChoices = document.querySelectorAll("[data-platform-choice]");
      let resetTimer;

      const clearResetTimer = () => {
        if (resetTimer) {
          window.clearTimeout(resetTimer);
          resetTimer = undefined;
        }
      };

      const closeChoices = () => {
        control.classList.remove("is-open");
        trigger.setAttribute("aria-expanded", "false");
        clearResetTimer();
      };

      const scheduleReset = () => {
        clearResetTimer();
        resetTimer = window.setTimeout(() => {
          closeChoices();
        }, 3000);
      };

      trigger?.addEventListener("click", () => {
        const expanded = control.classList.toggle("is-open");
        trigger.setAttribute("aria-expanded", expanded ? "true" : "false");

        if (expanded) {
          scheduleReset();
        } else {
          clearResetTimer();
        }
      });

      platformChoices.forEach((choice) => {
        choice.addEventListener("click", () => {
          clearResetTimer();
        });
      });
    </script>
  </body>
</html>
