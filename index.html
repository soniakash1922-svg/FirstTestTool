<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mobile Team</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="hero-shell">
      <section class="hero-card">
        <p class="eyebrow">Unified Product Craft</p>
        <h1>Mobile Team</h1>
        <p class="hero-copy">
          Designing delightful experiences across Android and iOS with one
          focused, fast-moving team.
        </p>

        <div class="platform-grid" aria-label="Supported mobile platforms">
          <article class="platform-card android-card">
            <div class="icon-wrap" aria-hidden="true">
              <svg
                viewBox="0 0 120 120"
                role="img"
                focusable="false"
                class="platform-icon"
              >
                <title>Android</title>
                <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="6">
                  <path d="M37 45c5-12 17-20 23-20s18 8 23 20" />
                  <path d="M33 50h54v25c0 12-9 21-21 21H54c-12 0-21-9-21-21V50Z" fill="currentColor" stroke="none" />
                  <path d="M45 50V36" />
                  <path d="M75 50V36" />
                  <path d="M25 58v21" />
                  <path d="M95 58v21" />
                  <path d="M45 97v16" />
                  <path d="M75 97v16" />
                </g>
                <circle cx="50" cy="40" r="3.5" fill="#042814" />
                <circle cx="70" cy="40" r="3.5" fill="#042814" />
              </svg>
            </div>
            <h2>Android</h2>
            <p>Reliable builds, modern UI, and polished native performance.</p>
          </article>

          <article class="platform-card ios-card">
            <div class="icon-wrap" aria-hidden="true">
              <svg
                viewBox="0 0 120 120"
                role="img"
                focusable="false"
                class="platform-icon"
              >
                <title>iOS</title>
                <path
                  d="M79.12 61.49c.08 17.13 15.03 22.84 15.2 22.92-.13.4-2.39 8.2-7.84 16.24-4.71 6.96-9.59 13.89-17.29 14.03-7.57.14-10-4.49-18.68-4.49-8.69 0-11.39 4.35-18.54 4.63-7.42.28-13.07-7.45-17.82-14.39-9.72-14.07-17.14-39.77-7.17-57.11 4.95-8.61 13.8-14.06 23.4-14.2 7.28-.14 14.15 4.9 18.68 4.9 4.54 0 13.06-6.06 22.01-5.17 3.75.16 14.3 1.52 21.06 11.41-.55.34-12.57 7.33-12.41 21.23ZM65.26 24.8c3.94-4.76 6.6-11.37 5.87-17.95-5.67.23-12.54 3.78-16.61 8.53-3.64 4.22-6.83 10.95-5.97 17.38 6.31.48 12.76-3.2 16.71-7.96Z"
                  fill="currentColor"
                />
              </svg>
            </div>
            <h2>iOS</h2>
            <p>Elegant product experiences tuned for speed, motion, and detail.</p>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
